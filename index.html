<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
}

/* Floating Glow Background */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 10%, transparent 10%);
    background-size: 60px 60px;
    animation: moveBg 20s linear infinite;
    opacity: 0.4;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-200px,-200px); }
}

.container {
    position: relative;
    text-align: center;
    cursor: pointer;
}

/* Envelope */
.envelope {
    width: 220px;
    height: 150px;
    background: #ff4d6d;
    position: relative;
    border-radius: 12px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    transition: 0.6s;
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff758f;
    clip-path: polygon(0 0, 50% 60%, 100% 0);
    transform-origin: top;
    transition: 0.6s;
    border-radius: 12px;
}

.tap {
    color: white;
    font-size: 18px;
    margin-bottom: 15px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}

/* Card */
.card {
    position: absolute;
    width: 260px;
    background: white;
    border-radius: 20px;
    padding: 20px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    transition: 0.6s;
}

.card img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
}

.message {
    font-size: 16px;
    color: #444;
    min-height: 50px;
}

/* Floating hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
    opacity: 0.8;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-600px); opacity: 0; }
}

</style>
</head>

<body>

<div class="container" onclick="openEnvelope()">
    <div class="tap">Tap to Open 💌</div>
    <div class="envelope">
        <div class="flap"></div>
    </div>

    <div class="card">
        <img src="herphoto.jpg" alt="Her Photo">
        <div class="message" id="text"></div>
    </div>
</div>

<audio id="bgmusic" src="music.mp3"></audio>

<script>

let opened = false;
let text = "Happy Valentine's Day my pookie 💛 You are the most beautiful part of my life. I am so lucky to have you.";

function openEnvelope() {
    if (opened) return;
    opened = true;

    document.querySelector(".flap").style.transform = "rotateX(180deg)";
    document.querySelector(".card").style.transform = "translate(-50%, -50%) scale(1)";

    document.getElementById("bgmusic").play();

    typeEffect();

    for (let i = 0; i < 20; i++) {
        createHeart();
    }
}

function typeEffect() {
    let i = 0;
    let element = document.getElementById("text");

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 40);
        }
    }

    typing();
}

function createHeart() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "100%";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

</script>

</body>
</html>
