<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #ff2e63, #ff6b81);
}

/* Floating Hearts & Flowers Background */
.bg-item {
    position: absolute;
    font-size: 26px;
    animation: floatBg 12s linear infinite;
    opacity: 0.4;
}

@keyframes floatBg {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-120vh); }
}

.container {
    position: relative;
    text-align: center;
    cursor: pointer;
}

/* BIG Red Envelope */
.envelope {
    width: 320px;
    height: 220px;
    background: #cc0000;
    position: relative;
    border-radius: 15px;
    border: 6px solid white;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    transition: 0.6s;
}

/* Inside flap - RED */
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff1a1a;
    clip-path: polygon(0 0, 50% 60%, 100% 0);
    transform-origin: top;
    transition: 0.6s;
    border-radius: 15px;
}

/* Tap text bigger */
.tap {
    color: white;
    font-size: 22px;
    margin-bottom: 20px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}

/* Card */
.card {
    position: absolute;
    width: 300px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    transition: 0.6s;
}

.card img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
}

/* Bigger message text */
.message {
    font-size: 20px;
    color: #333;
    min-height: 60px;
}

.heart {
    position: absolute;
    font-size: 22px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-600px); opacity: 0; }
}
</style>
</head>

<body>

<div class="container" onclick="openEnvelope()">
    <div class="tap">Tap to Open 💌</div>

    <div class="envelope">
        <div class="flap"></div>
    </div>

    <div class="card">
        <img src="herphoto.jpg" alt="Her Photo">
        <div class="message" id="text"></div>
    </div>
</div>

<audio id="bgmusic" src="music.mp3"></audio>

<script>

let opened = false;
let text = "Happy Valentine's Day my love ❤️ You are my happiness, my peace, and my forever.";

function openEnvelope() {
    if (opened) return;
    opened = true;

    document.querySelector(".flap").style.transform = "rotateX(180deg)";
    document.querySelector(".card").style.transform = "translate(-50%, -50%) scale(1)";

    document.getElementById("bgmusic").play();

    typeEffect();

    for (let i = 0; i < 25; i++) {
        createHeart();
    }
}

function typeEffect() {
    let i = 0;
    let element = document.getElementById("text");

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 40);
        }
    }

    typing();
}

function createHeart() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = Math.random() > 0.5 ? "❤️" : "🌸";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "100%";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

/* Background floating items */
for (let i = 0; i < 30; i++) {
    let bg = document.createElement("div");
    bg.className = "bg-item";
    bg.innerHTML = Math.random() > 0.5 ? "❤️" : "🌹";
    bg.style.left = Math.random() * window.innerWidth + "px";
    bg.style.animationDuration = (8 + Math.random() * 6) + "s";
    document.body.appendChild(bg);
}

</script>

</body>
</html>
